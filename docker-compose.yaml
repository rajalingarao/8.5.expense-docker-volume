version: '3.8'
name: expense
networks:
  default:
    name: expense
volumes:
  mysql:

services:
  mysql:
    image: mysql:v1.1
    container_name: mysql
    volumes:
      - mysql: /var/lib/mysql
  backend:
    image: backend:v1.1
    container_name: backend
    command: sh -c "sleep 60 && node /opt/server/index.js"
    depends_on:
    - mysql
  frontend:
    image: frontend:v1.1
    container_name: frontend
    depends_on:
    - backend
    ports:
    - "80:80"

  
